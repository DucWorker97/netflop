services:
  postgres:
    image: postgres:15-alpine
    container_name: netflop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: netflop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d netflop" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: netflop-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: netflop-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: netflop-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c " sleep 5; mc alias set local http://minio:9000 minioadmin minioadmin; mc mb -p local/netflop-media || true; mc anonymous set download local/netflop-media/hls || true; mc anonymous set download local/netflop-media/posters || true; mc anonymous set download local/netflop-media/thumbnails || true; mc anonymous set download local/netflop-media/subtitles || true; echo 'MinIO bucket initialized'; exit 0; "

  # ClickHouse for Analytics (Big Data)
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: netflop-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: netflop_analytics
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
    ports:
      - "8123:8123" # HTTP interface
      - "9009:9000" # Native interface (remapped to avoid MinIO conflict)
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8123/ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # AI Curator – hybrid recommendation engine (FastAPI + ML)
  ai-curator:
    build:
      context: ./apps/ai-curator
      dockerfile: Dockerfile
    container_name: netflop-ai-curator
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/netflop
      REDIS_URL: redis://redis:6379/0
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_DB: netflop_analytics
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-}
      MODEL_PATH: /app/models
    ports:
      - "8000:8000"
    volumes:
      - ai-models:/app/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  postgres-data:
  minio-data:
  clickhouse-data:
  ai-models:
