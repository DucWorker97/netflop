name: Nightly Video Smoke

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: 'nightly-video-smoke'
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9.15.0'

jobs:
  video-smoke:
    name: Video Pipeline E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Verify
        run: pnpm -w verify

      - name: Start Infrastructure
        run: docker compose up -d

      - name: Wait for Healthy
        run: |
          echo "Waiting for services..."
          sleep 10
          timeout 60 bash -c 'until docker inspect --format="{{.State.Health.Status}}" netflop-minio 2>/dev/null | grep -q healthy; do sleep 2; done'
          timeout 60 bash -c 'until docker inspect --format="{{.State.Health.Status}}" netflop-redis 2>/dev/null | grep -q healthy; do sleep 2; done'
          timeout 60 bash -c 'until docker inspect --format="{{.State.Health.Status}}" netflop-postgres 2>/dev/null | grep -q healthy; do sleep 2; done'
          docker compose ps

      - name: DB Setup
        run: |
          pnpm db:generate
          pnpm db:migrate:deploy
          pnpm db:seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/netflop

      - name: Start Services
        run: |
          pnpm --filter @netflop/api dev > api.log 2>&1 &
          pnpm --filter @netflop/worker dev > worker.log 2>&1 &
          echo "Services started in background, waiting 15s..."
          sleep 15
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/netflop
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret
          JWT_REFRESH_SECRET: ci-test-refresh-secret
          S3_ENDPOINT: http://localhost:9000
          S3_REGION: us-east-1
          S3_ACCESS_KEY: minioadmin
          S3_SECRET_KEY: minioadmin
          S3_BUCKET: netflop-media
          UPLOAD_PRESIGNED_TTL_SECONDS: 3600

      - name: Run Smoke Test
        run: |
          mkdir -p artifacts
          pnpm -w smoke:video
        env:
          API_URL: http://localhost:3000
          ENCODE_TIMEOUT: 600

      - name: Collect Artifacts
        if: always()
        run: |
          mkdir -p artifacts
          docker compose ps > artifacts/compose_ps.txt
          docker compose logs --no-color > artifacts/compose.log
          cp api.log artifacts/api.log || true
          cp worker.log artifacts/worker.log || true
          ls -R artifacts/

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-artifacts
          path: artifacts/

      - name: Cleanup
        if: always()
        run: docker compose down -v
